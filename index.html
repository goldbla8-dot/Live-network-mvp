<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Network Platform</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1f1f1f; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #333; }
        #main-container { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        #video-window { flex: 2; background: #000; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; position: relative; margin-bottom: 10px; }
        #chat-container { flex: 1; background: #1f1f1f; border-radius: 8px; display: flex; flex-direction: column; padding: 10px; }
        #chat-messages { flex: 1; overflow-y: auto; font-size: 0.9rem; margin-bottom: 10px; }
        #chat-input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #333; color: #fff; }
        button { padding: 10px 15px; border: none; border-radius: 4px; background: #00bcd4; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>🌐 LIVE NETWORK HUB</header>

    <div id="main-container">
        <div id="video-window">
            <span style="color: #666;">[ Live Network Feed Window ]</span>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message to the network...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
